<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no" />
    <meta name="theme-color" content="#173f35" />
    <meta name="description" content="家族で巡る動物園・水族館の記録アプリ" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=LINE+Seed+JP:wght@400;700;800&display=swap" />
    <link rel="icon" href="%BASE_URL%favicon.ico" />
    <link rel="apple-touch-icon" href="%BASE_URL%apple-touch-icon.png" />
    <title>動物園・水族館ログ</title>
    <script>
      (() => {
        const storageKey = "zoo-aquarium-log:animations-enabled:v1";
        let enabled = true;
        try {
          enabled = window.localStorage.getItem(storageKey) !== "false";
        } catch {
          // localStorage unavailable or blocked: animations remain enabled by default.
        }
        document.documentElement.dataset.animations = enabled ? "on" : "off";
      })();
    </script>
    <style>
      #splash {
        position: fixed;
        z-index: 10000;
        inset: 0;
        overflow: hidden;
        isolation: isolate;
        display: grid;
        place-items: center;
        background: #173f35;
        color: #f7f4e8;
        font-family: "LINE Seed JP", "Hiragino Sans", "Yu Gothic UI", system-ui, sans-serif;
        opacity: 1;
        transition: opacity 400ms cubic-bezier(0.22, 1, 0.36, 1);
      }

      #splash::before,
      #splash::after {
        position: absolute;
        inset: -25%;
        z-index: -3;
        pointer-events: none;
        content: "";
      }

      #splash::before {
        background:
          radial-gradient(circle at 50% 42%, #a8d8d72b 0, #a8d8d70e 18%, transparent 43%),
          radial-gradient(circle at 18% 24%, #f3c67425 0, transparent 29%),
          radial-gradient(circle at 84% 76%, #5cc7c122 0, transparent 31%);
        filter: blur(20px);
        animation: splash-aurora-drift 9s ease-in-out infinite alternate;
      }

      #splash::after {
        z-index: -2;
        opacity: 0.28;
        background-image: linear-gradient(115deg, transparent 0 46%, #f7f4e80a 47% 48%, transparent 49% 100%);
        background-size: 160px 160px;
        transform: rotate(-8deg) scale(1.4);
        animation: splash-grid-slide 14s linear infinite;
      }

      #splash[data-splash-state="hiding"] {
        pointer-events: none;
        opacity: 0;
      }

      .splash-ambient,
      .splash-particle-field {
        position: absolute;
        inset: 0;
        pointer-events: none;
      }

      .splash-ambient {
        z-index: -1;
      }

      .splash-aurora {
        position: absolute;
        top: 50%;
        left: 50%;
        width: min(72vw, 700px);
        aspect-ratio: 1;
        border-radius: 50%;
        background: radial-gradient(circle, #a8d8d72b 0, #5cc7c115 24%, transparent 68%);
        filter: blur(34px);
        transform: translate(-50%, -50%);
        animation: splash-aurora-breathe 7s ease-in-out infinite;
      }

      .splash-wave {
        position: absolute;
        top: 50%;
        left: 50%;
        width: min(70vw, 560px);
        aspect-ratio: 1;
        border: 1px solid #a8d8d744;
        border-radius: 50%;
        box-shadow: 0 0 38px #a8d8d71f, inset 0 0 38px #a8d8d714;
        opacity: 0;
        transform: translate(-50%, -50%) scale(0.35);
        animation: splash-wave-expand 5.4s ease-out infinite;
      }

      .splash-wave:nth-child(2) {
        animation-delay: 1.8s;
      }

      .splash-wave:nth-child(3) {
        animation-delay: 3.6s;
      }

      .splash-orbit {
        position: absolute;
        top: 50%;
        left: 50%;
        width: min(78vw, 620px);
        height: min(30vw, 220px);
        border: 1px solid #a8d8d755;
        border-radius: 50%;
        box-shadow: 0 0 22px #a8d8d714;
        transform: translate(-50%, -50%) rotate(-18deg);
        animation: splash-orbit-spin 12s linear infinite;
      }

      .splash-orbit::before,
      .splash-orbit::after {
        position: absolute;
        width: 8px;
        height: 8px;
        border-radius: 50%;
        content: "";
      }

      .splash-orbit::before {
        top: 14%;
        left: 17%;
        background: #f3c674;
        box-shadow: 0 0 18px 5px #f3c67455;
      }

      .splash-orbit::after {
        right: 11%;
        bottom: 16%;
        width: 5px;
        height: 5px;
        background: #a8d8d7;
        box-shadow: 0 0 14px 4px #a8d8d766;
      }

      .splash-orbit-two {
        width: min(66vw, 510px);
        height: min(52vw, 330px);
        border-color: #f3c67442;
        transform: translate(-50%, -50%) rotate(58deg);
        animation-duration: 16s;
        animation-direction: reverse;
      }

      .splash-orbit-two::before {
        top: auto;
        right: 12%;
        bottom: 13%;
        left: auto;
        background: #5cc7c1;
        box-shadow: 0 0 18px 5px #5cc7c155;
      }

      .splash-particle-field {
        z-index: 0;
      }

      .splash-particle-field span {
        position: absolute;
        top: 50%;
        left: 50%;
        width: 5px;
        height: 5px;
        border-radius: 50%;
        background: #dce9e4;
        box-shadow: 0 0 12px 3px #a8d8d744;
        animation: splash-particle-drift 4.8s ease-in-out infinite;
      }

      .splash-particle-field span:nth-child(1) { margin: -30vh 0 0 -35vw; animation-delay: -1.1s; }
      .splash-particle-field span:nth-child(2) { margin: 26vh 0 0 -26vw; width: 3px; height: 3px; animation-delay: -3.2s; }
      .splash-particle-field span:nth-child(3) { margin: -33vh 0 0 28vw; background: #f3c674; animation-delay: -2.4s; }
      .splash-particle-field span:nth-child(4) { margin: 31vh 0 0 34vw; width: 4px; height: 4px; animation-delay: -0.8s; }
      .splash-particle-field span:nth-child(5) { margin: -8vh 0 0 -43vw; width: 3px; height: 3px; background: #5cc7c1; animation-delay: -4s; }
      .splash-particle-field span:nth-child(6) { margin: 5vh 0 0 42vw; width: 3px; height: 3px; animation-delay: -2.1s; }
      .splash-particle-field span:nth-child(7) { margin: -42vh 0 0 4vw; width: 4px; height: 4px; background: #f3c674; animation-delay: -3.7s; }
      .splash-particle-field span:nth-child(8) { margin: 40vh 0 0 -5vw; width: 3px; height: 3px; background: #5cc7c1; animation-delay: -1.7s; }

      .splash-content {
        position: relative;
        z-index: 2;
        display: grid;
        justify-items: center;
        gap: 16px;
        padding: 32px 24px;
        text-align: center;
      }

      .splash-emblem {
        position: relative;
        display: grid;
        width: clamp(132px, 32vw, 170px);
        aspect-ratio: 1;
        place-items: center;
        animation: splash-emblem-enter 1.15s cubic-bezier(0.16, 1, 0.3, 1) both;
      }

      .splash-icon-halo,
      .splash-icon-backplate {
        position: absolute;
        inset: 0;
        border-radius: 32%;
      }

      .splash-icon-halo {
        inset: -18px;
        border: 1px solid #a8d8d766;
        box-shadow: 0 0 0 1px #f3c6741f, 0 0 34px #a8d8d733;
        animation: splash-halo-breathe 3.2s ease-in-out infinite;
      }

      .splash-icon-backplate {
        inset: -5px;
        background: linear-gradient(135deg, #f7f4e814, #a8d8d714);
        border: 1px solid #f7f4e82b;
        box-shadow: 0 18px 50px #102e2855, inset 0 1px #f7f4e81f;
        transform: rotate(5deg);
      }

      .splash-icon {
        position: relative;
        z-index: 1;
        display: block;
        width: 100%;
        height: 100%;
        border-radius: 28%;
        object-fit: cover;
        filter: drop-shadow(0 12px 18px #102e2877);
        animation: splash-icon-reveal 1.25s 120ms cubic-bezier(0.16, 1, 0.3, 1) both;
      }

      .splash-copy,
      .splash-status-row {
        animation: splash-copy-rise 850ms cubic-bezier(0.16, 1, 0.3, 1) both;
      }

      .splash-copy {
        display: grid;
        gap: 7px;
      }

      .splash-status-row {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        gap: 10px;
        margin-top: 17px;
        animation-delay: 260ms;
      }

      .splash-eyebrow,
      .splash-title,
      .splash-status {
        margin: 0;
      }

      .splash-eyebrow {
        color: #a8d8d7;
        font-size: 10px;
        font-weight: 700;
        letter-spacing: 0.2em;
      }

      .splash-title {
        font-size: clamp(21px, 5vw, 25px);
        font-weight: 700;
        letter-spacing: 0.05em;
        text-shadow: 0 0 24px #a8d8d733;
      }

      .splash-status {
        color: #dce9e4;
        font-size: 13px;
      }

      .splash-pulse {
        width: 7px;
        height: 7px;
        border-radius: 50%;
        background: #a8d8d7;
        box-shadow: 0 0 0 0 #a8d8d788;
        animation: splash-pulse 1.5s ease-out infinite;
      }

      .splash-reload {
        margin-top: 10px;
        padding: 9px 16px;
        border: 1px solid #a8d8d7;
        border-radius: 999px;
        background: #173f35aa;
        color: #f7f4e8;
        font: inherit;
        font-size: 13px;
        cursor: pointer;
      }

      .splash-reload[hidden] {
        display: none;
      }

      #splash[data-splash-state="stalled"] .splash-pulse {
        display: none;
      }

      #splash[data-splash-state="stalled"] .splash-reload {
        display: inline-flex;
      }

      @keyframes splash-aurora-drift {
        0% { transform: translate3d(-4%, -3%, 0) rotate(-4deg) scale(1); }
        100% { transform: translate3d(5%, 4%, 0) rotate(5deg) scale(1.08); }
      }

      @keyframes splash-aurora-breathe {
        0%, 100% { opacity: 0.55; transform: translate(-50%, -50%) scale(0.85); }
        50% { opacity: 1; transform: translate(-50%, -50%) scale(1.08); }
      }

      @keyframes splash-grid-slide {
        to { background-position: 160px 160px; }
      }

      @keyframes splash-wave-expand {
        0% { opacity: 0; transform: translate(-50%, -50%) scale(0.35); }
        12% { opacity: 0.5; }
        70% { opacity: 0.08; }
        100% { opacity: 0; transform: translate(-50%, -50%) scale(1.35); }
      }

      @keyframes splash-orbit-spin {
        from { transform: translate(-50%, -50%) rotate(-18deg) rotate(0deg); }
        to { transform: translate(-50%, -50%) rotate(-18deg) rotate(360deg); }
      }

      @keyframes splash-particle-drift {
        0%, 100% { opacity: 0.25; transform: translate3d(0, 8px, 0) scale(0.7); }
        50% { opacity: 1; transform: translate3d(0, -12px, 0) scale(1.35); }
      }

      @keyframes splash-emblem-enter {
        0% { opacity: 0; transform: translateY(18px) scale(0.68) rotate(-8deg); }
        65% { opacity: 1; transform: translateY(-3px) scale(1.04) rotate(2deg); }
        100% { opacity: 1; transform: translateY(0) scale(1) rotate(0deg); }
      }

      @keyframes splash-icon-reveal {
        0% { opacity: 0; filter: blur(18px) saturate(0.6) brightness(1.35); transform: scale(0.62) rotate(10deg); }
        70% { opacity: 1; filter: blur(0) saturate(1.08) brightness(1.05); transform: scale(1.04) rotate(-2deg); }
        100% { opacity: 1; filter: blur(0) saturate(1) brightness(1); transform: scale(1) rotate(0deg); }
      }

      @keyframes splash-halo-breathe {
        0%, 100% { opacity: 0.58; transform: scale(0.96) rotate(0deg); }
        50% { opacity: 1; transform: scale(1.08) rotate(8deg); }
      }

      @keyframes splash-copy-rise {
        from { opacity: 0; transform: translateY(14px); }
        to { opacity: 1; transform: translateY(0); }
      }

      @keyframes splash-pulse {
        to { box-shadow: 0 0 0 13px #a8d8d700; }
      }

      html[data-animations="off"] #splash,
      html[data-animations="off"] #splash::before,
      html[data-animations="off"] #splash::after,
      html[data-animations="off"] #splash *,
      html[data-animations="off"] #splash *::before,
      html[data-animations="off"] #splash *::after {
        animation: none !important;
        transition: none !important;
      }

      html[data-animations="off"] #splash {
        scroll-behavior: auto;
      }
    </style>
    <script>
      (() => {
        const startedAt = performance.now();
        const minimumVisibleMs = 600;
        const postReadyVisibleMs = 2000;
        const timeoutMs = 10000;
        let state = "visible";
        let readyReceived = false;
        let readyAt;
        let fadeTimer;
        let removalTimer;
        let stalledTimer;

        const getSplash = () => document.getElementById("splash");

        const removeSplash = () => {
          if (state === "removed") return;
          state = "removed";
          window.clearTimeout(fadeTimer);
          window.clearTimeout(removalTimer);
          window.clearTimeout(stalledTimer);
          getSplash()?.remove();
          window.removeEventListener("app:splash-ready", onSplashReady);
          window.removeEventListener("transitionend", onTransitionEnd);
          document.removeEventListener("click", onDocumentClick);
        };

        const startFade = () => {
          const splash = getSplash();
          if (!splash || state === "removed" || state === "hiding") return;
          state = "hiding";
          splash.dataset.splashState = state;
          removalTimer = window.setTimeout(removeSplash, 500);
        };

        const scheduleFade = () => {
          window.clearTimeout(fadeTimer);
          const targetTime = readyAt === undefined
            ? startedAt + minimumVisibleMs
            : readyAt + postReadyVisibleMs;
          const waitMs = Math.max(0, targetTime - performance.now());
          fadeTimer = window.setTimeout(startFade, waitMs);
        };

        const onSplashReady = () => {
          if (state === "removed" || state === "hiding") return;
          if (readyReceived) return;
          readyReceived = true;
          readyAt = performance.now();
          const splash = getSplash();
          const status = splash?.querySelector(".splash-status");
          const reload = splash?.querySelector(".splash-reload");
          if (status) {
            status.textContent = "読み込んでいます";
            status.setAttribute("role", "status");
          }
          if (reload instanceof HTMLButtonElement) reload.hidden = true;
          if (state === "visible") {
            state = "waiting";
            if (splash) splash.dataset.splashState = state;
          }
          scheduleFade();
        };

        const onTransitionEnd = (event) => {
          if (event.target === getSplash() && event.propertyName === "opacity") {
            removeSplash();
          }
        };

        const onDocumentClick = (event) => {
          if (event.target instanceof Element && event.target.closest(".splash-reload")) {
            window.location.reload();
          }
        };

        window.addEventListener("app:splash-ready", onSplashReady);
        window.addEventListener("transitionend", onTransitionEnd);
        document.addEventListener("click", onDocumentClick);
        stalledTimer = window.setTimeout(() => {
          const splash = getSplash();
          if (readyReceived || !splash || state === "removed" || state === "hiding") return;
          state = "stalled";
          splash.dataset.splashState = state;
          const status = splash.querySelector(".splash-status");
          const reload = splash.querySelector(".splash-reload");
          if (status) {
            status.textContent = "読み込みに時間がかかっています";
            status.setAttribute("role", "alert");
          }
          if (reload instanceof HTMLButtonElement) reload.hidden = false;
        }, timeoutMs);
      })();
    </script>
  </head>
  <body>
    <div id="splash" data-splash-state="visible">
      <div class="splash-ambient" aria-hidden="true">
        <span class="splash-aurora"></span>
        <span class="splash-wave"></span>
        <span class="splash-wave"></span>
        <span class="splash-wave"></span>
        <span class="splash-orbit splash-orbit-one"></span>
        <span class="splash-orbit splash-orbit-two"></span>
      </div>
      <div class="splash-particle-field" aria-hidden="true">
        <span></span><span></span><span></span><span></span>
        <span></span><span></span><span></span><span></span>
      </div>
      <div class="splash-content">
        <div class="splash-emblem">
          <span class="splash-icon-halo" aria-hidden="true"></span>
          <span class="splash-icon-backplate" aria-hidden="true"></span>
          <img class="splash-icon" src="./assets/icon.png" alt="" width="1254" height="1254" fetchpriority="high" draggable="false" />
        </div>
        <div class="splash-copy">
          <p class="splash-eyebrow" aria-hidden="true">FAMILY FIELD NOTE</p>
          <p class="splash-title">動物園・水族館ログ</p>
          <div class="splash-status-row">
            <p class="splash-status" role="status">読み込んでいます</p>
            <span class="splash-pulse" aria-hidden="true"></span>
          </div>
          <button type="button" class="splash-reload" hidden>再読み込み</button>
        </div>
      </div>
    </div>    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>

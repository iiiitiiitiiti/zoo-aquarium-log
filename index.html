<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <meta name="theme-color" content="#173f35" />
    <meta name="description" content="家族で巡る動物園・水族館の記録アプリ" />
    <link rel="icon" href="%BASE_URL%favicon.ico" />
    <link rel="apple-touch-icon" href="%BASE_URL%apple-touch-icon.png" />
    <title>動物園・水族館ログ</title>
    <style>
      #splash {
        position: fixed;
        z-index: 10000;
        inset: 0;
        display: grid;
        place-items: center;
        align-content: center;
        gap: 10px;
        background: #173f35;
        color: #f7f4e8;
        font-family: "Hiragino Sans", "Yu Gothic UI", system-ui, sans-serif;
        opacity: 1;
        transition: opacity 400ms ease;
      }

      #splash[data-splash-state="hiding"] {
        pointer-events: none;
        opacity: 0;
      }

      .splash-icon {
        width: 112px;
        height: 112px;
        margin-bottom: 8px;
        filter: drop-shadow(0 10px 22px #102e2855);
      }

      .splash-eyebrow,
      .splash-title,
      .splash-status {
        margin: 0;
      }

      .splash-eyebrow {
        color: #a8d8d7;
        font-size: 10px;
        font-weight: 700;
        letter-spacing: 0.18em;
      }

      .splash-title {
        font-size: 22px;
        font-weight: 700;
        letter-spacing: 0.04em;
      }

      .splash-status {
        margin-top: 24px;
        color: #dce9e4;
        font-size: 13px;
      }

      .splash-pulse {
        width: 18px;
        height: 18px;
        margin-top: 2px;
        border-radius: 50%;
        background: #a8d8d7;
        box-shadow: 0 0 0 0 #a8d8d766;
        animation: splash-pulse 1.3s ease-out infinite;
      }

      .splash-reload {
        display: none;
        margin-top: 10px;
        padding: 9px 16px;
        border: 1px solid #a8d8d7;
        border-radius: 999px;
        background: transparent;
        color: #f7f4e8;
        font: inherit;
        font-size: 13px;
        cursor: pointer;
      }

      #splash[data-splash-state="stalled"] .splash-pulse {
        display: none;
      }

      #splash[data-splash-state="stalled"] .splash-reload {
        display: inline-flex;
      }

      @keyframes splash-pulse {
        to {
          box-shadow: 0 0 0 18px #a8d8d700;
        }
      }

      @media (prefers-reduced-motion: reduce) {
        #splash {
          transition-duration: 0ms;
        }

        .splash-pulse {
          animation: none;
        }
      }
    </style>
    <script>
      (() => {
        const startedAt = performance.now();
        const minimumVisibleMs = 600;
        const timeoutMs = 10000;
        let state = "visible";
        let readyReceived = false;
        let fadeTimer;
        let removalTimer;
        let stalledTimer;

        const getSplash = () => document.getElementById("splash");

        const removeSplash = () => {
          if (state === "removed") return;
          state = "removed";
          window.clearTimeout(fadeTimer);
          window.clearTimeout(removalTimer);
          window.clearTimeout(stalledTimer);
          getSplash()?.remove();
          window.removeEventListener("app:splash-ready", onSplashReady);
          window.removeEventListener("transitionend", onTransitionEnd);
          document.removeEventListener("click", onDocumentClick);
        };

        const startFade = () => {
          const splash = getSplash();
          if (!splash || state === "removed" || state === "hiding") return;
          state = "hiding";
          splash.dataset.splashState = state;
          removalTimer = window.setTimeout(removeSplash, 500);
        };

        const scheduleFade = () => {
          window.clearTimeout(fadeTimer);
          const waitMs = Math.max(0, startedAt + minimumVisibleMs - performance.now());
          fadeTimer = window.setTimeout(startFade, waitMs);
        };

        const onSplashReady = () => {
          if (state === "removed" || state === "hiding") return;
          readyReceived = true;
          const splash = getSplash();
          const status = splash?.querySelector(".splash-status");
          const reload = splash?.querySelector(".splash-reload");
          if (status) {
            status.textContent = "読み込んでいます";
            status.setAttribute("role", "status");
          }
          if (reload instanceof HTMLButtonElement) reload.hidden = true;
          if (state === "visible") {
            state = "waiting";
            if (splash) splash.dataset.splashState = state;
          }
          scheduleFade();
        };

        const onTransitionEnd = (event) => {
          if (event.target === getSplash() && event.propertyName === "opacity") {
            removeSplash();
          }
        };

        const onDocumentClick = (event) => {
          if (event.target instanceof Element && event.target.closest(".splash-reload")) {
            window.location.reload();
          }
        };

        window.addEventListener("app:splash-ready", onSplashReady);
        window.addEventListener("transitionend", onTransitionEnd);
        document.addEventListener("click", onDocumentClick);
        stalledTimer = window.setTimeout(() => {
          const splash = getSplash();
          if (readyReceived || !splash || state === "removed" || state === "hiding") return;
          state = "stalled";
          splash.dataset.splashState = state;
          const status = splash.querySelector(".splash-status");
          const reload = splash.querySelector(".splash-reload");
          if (status) {
            status.textContent = "読み込みに時間がかかっています";
            status.setAttribute("role", "alert");
          }
          if (reload instanceof HTMLButtonElement) reload.hidden = false;
        }, timeoutMs);
      })();
    </script>
  </head>
  <body>
    <div id="splash" data-splash-state="visible">
      <svg class="splash-icon" viewBox="0 0 512 512" aria-hidden="true" focusable="false">
        <rect width="512" height="512" rx="112" fill="#173f35" stroke="#a8d8d7" stroke-opacity="0.6" stroke-width="8" />
        <g fill="#f7f4e8">
          <ellipse cx="152" cy="174" rx="42" ry="58" transform="rotate(-28 152 174)" />
          <ellipse cx="252" cy="124" rx="42" ry="60" transform="rotate(-6 252 124)" />
          <ellipse cx="352" cy="150" rx="42" ry="58" transform="rotate(20 352 150)" />
          <path d="M144 307c0-72 48-112 111-112s113 40 113 112c0 58-42 91-112 91s-112-33-112-91Z" />
        </g>
        <path fill="#a8d8d7" d="M166 405c49 22 108 24 168 1-26 42-74 66-125 54-23-5-39-21-43-55Zm208-8 54 17-33 14-27-17 6-14Z" />
      </svg>
      <p class="splash-eyebrow" aria-hidden="true">FAMILY FIELD NOTE</p>
      <p class="splash-title">動物園・水族館ログ</p>
      <p class="splash-status" role="status">読み込んでいます</p>
      <span class="splash-pulse" aria-hidden="true"></span>
      <button type="button" class="splash-reload" hidden>再読み込み</button>
    </div>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
